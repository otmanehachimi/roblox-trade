<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBLX Trade Hub Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#2563eb,#7c3aed);
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

.trade{
background:#1f2937;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.trade img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.chatBox{
height:150px;
overflow:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
}

.msg{
margin-bottom:5px;
}

</style>

</head>

<body>

<header>
🎮 RBLX Trade Hub
</header>

<div class="container">

<div class="card">
<h2>Créer une offre</h2>

<input id="user" placeholder="Pseudo Roblox">

<select id="game">
<option>Blox Fruits</option>
<option>Adopt Me!</option>
<option>Pet Simulator 99</option>
<option>Blade Ball</option>
<option>Brookhaven RP</option>
<option>Murder Mystery 2</option>
<option>Jailbreak</option>
<option>King Legacy</option>
<option>Anime Adventures</option>
<option>Fisch</option>
<option>Grow a Garden</option>
<option>Steal a Brainrot</option>
</select>

<textarea id="offer" placeholder="Ton échange"></textarea>

<button onclick="addTrade()">Publier</button>
</div>

<div class="card">
<h2>💬 Chat</h2>

<div id="chatBox" class="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Envoyer</button>
</div>

<div id="list"></div>

</div>

<script>

// images des jeux
const gameImages = {
"Blox Fruits":"https://tr.rbxcdn.com/placeholder",
"Adopt Me!":"https://tr.rbxcdn.com/placeholder",
"Pet Simulator 99":"https://tr.rbxcdn.com/placeholder",
"Blade Ball":"https://tr.rbxcdn.com/placeholder",
"Brookhaven RP":"https://tr.rbxcdn.com/placeholder",
"Murder Mystery 2":"https://tr.rbxcdn.com/placeholder",
"Jailbreak":"https://tr.rbxcdn.com/placeholder",
"King Legacy":"https://tr.rbxcdn.com/placeholder",
"Anime Adventures":"https://tr.rbxcdn.com/placeholder",
"Fisch":"https://tr.rbxcdn.com/placeholder",
"Grow a Garden":"https://tr.rbxcdn.com/placeholder",
"Steal a Brainrot":"https://tr.rbxcdn.com/placeholder"
};

let trades = [];

function addTrade(){

let user=document.getElementById("user").value;
let game=document.getElementById("game").value;
let offer=document.getElementById("offer").value;

if(!user||!game||!offer) return alert("Remplis tout");

trades.unshift({user,game,offer});
render();
}

function render(){

let list=document.getElementById("list");
list.innerHTML="";

trades.forEach(t=>{

list.innerHTML+=`
<div class="trade">

<img src="${gameImages[t.game]}" onerror="this.style.display='none'">

<b>👤 ${t.user}</b> - 🎮 ${t.game}

<p>${t.offer}</p>

</div>
`;

});

}

function sendMsg(){

let msg=document.getElementById("msg").value;
if(!msg) return;

document.getElementById("chatBox").innerHTML+=
`<div class="msg">💬 ${msg}</div>`;

document.getElementById("msg").value="";
}

render();

</script>

</body>

</html>
