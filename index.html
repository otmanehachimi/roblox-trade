<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RBLX Trade Hub Pro+</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#2563eb,#7c3aed);
padding:25px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.trade{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.delete{
background:#ef4444;
margin-top:8px;
}

.stats{
display:flex;
gap:10px;
margin-bottom:15px;
}

.stat{
flex:1;
background:#111827;
padding:15px;
border-radius:10px;
text-align:center;
}

.stat h2{
margin:0;
color:#60a5fa;
}

/* CHAT */
#chatBox{
height:220px;
overflow:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.msg{
margin-bottom:6px;
font-size:14px;
}

@media(max-width:700px){
.stats{flex-direction:column;}
}

</style>

</head>

<body>

<header>
🎮 RBLX Trade Hub Pro+ + Chat
</header>

<div class="container">

<!-- STATS -->
<div class="stats">
<div class="stat">
<h2 id="count">0</h2>
<p>Offres</p>
</div>

<div class="stat">
<h2>💬</h2>
<p>Chat live</p>
</div>
</div>

<!-- OFFRE -->
<div class="card">

<h2>Créer une offre</h2>

<input id="user" placeholder="Pseudo Roblox">

<select id="game">

<option>Blox Fruits</option>
<option>Adopt Me!</option>
<option>Pet Simulator 99</option>
<option>Blade Ball</option>
<option>Brookhaven RP</option>
<option>Murder Mystery 2</option>
<option>Jailbreak</option>
<option>King Legacy</option>
<option>Anime Adventures</option>
<option>Fisch</option>
<option>Grow a Garden</option>
<option>Steal a Brainrot</option>

</select>

<textarea id="offer" placeholder="Ton échange"></textarea>

<button onclick="addTrade()">Publier</button>

</div>

<!-- CHAT -->
<div class="card">

<h2>💬 Chat global</h2>

<div id="chatBox"></div>

<input id="msg" placeholder="Écris un message...">
<button onclick="sendMsg()">Envoyer</button>

</div>

<!-- LISTE OFFRES -->
<div id="list"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>

// 🔥 CONFIG FIREBASE (À REMPLACER)
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  databaseURL: "https://TON_PROJECT.firebaseio.com",
  projectId: "TON_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 💾 OFFRES LOCAL
let trades = JSON.parse(localStorage.getItem("trades")) || [];

function render(){

let list = document.getElementById("list");
list.innerHTML="";

document.getElementById("count").innerText = trades.length;

trades.forEach((t,i)=>{

list.innerHTML += `
<div class="trade">

<b>👤 ${t.user}</b> - 🎮 ${t.game}

<p>${t.offer}</p>

<button class="delete" onclick="removeTrade(${i})">
Supprimer
</button>

</div>
`;

});

}

function addTrade(){

let user = document.getElementById("user").value;
let game = document.getElementById("game").value;
let offer = document.getElementById("offer").value;

if(!user || !game || !offer){
alert("Remplis tout !");
return;
}

trades.unshift({user,game,offer});

localStorage.setItem("trades",JSON.stringify(trades));

document.getElementById("user").value="";
document.getElementById("offer").value="";

render();

}

function removeTrade(i){
trades.splice(i,1);
localStorage.setItem("trades",JSON.stringify(trades));
render();
}

render();

// 💬 CHAT
function sendMsg(){

let msg = document.getElementById("msg").value;
if(!msg) return;

db.ref("chat").push({
text: msg,
time: Date.now()
});

document.getElementById("msg").value="";
}

db.ref("chat").on("child_added", snap=>{
let data = snap.val();

document.getElementById("chatBox").innerHTML +=
`<div class="msg">💬 ${data.text}</div>`;
});

</script>

</body>
</html>
