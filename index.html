<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RBLX Trade Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#2563eb;
padding:25px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.trade{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:10px;
transition:0.2s;
}

.trade:hover{
transform:scale(1.02);
}

.small{
font-size:12px;
color:#aaa;
}

.delete{
background:red;
margin-top:8px;
}

.delete:hover{
background:#b91c1c;
}

.stats{
display:flex;
gap:10px;
margin-bottom:15px;
}

.stat{
flex:1;
background:#111827;
padding:15px;
border-radius:10px;
text-align:center;
}

.stat h2{
margin:0;
color:#60a5fa;
}

@media(max-width:700px){
.stats{flex-direction:column;}
}

</style>

</head>

<body>

<header>
🎮 RBLX Trade Hub
</header>

<div class="container">

<div class="stats">

<div class="stat">
<h2 id="count">0</h2>
<p>Offres</p>
</div>

<div class="stat">
<h2>🔥</h2>
<p>Trading</p>
</div>

</div>

<div class="card">

<h2>Créer une offre</h2>

<input id="user" placeholder="Pseudo Roblox">

<select id="game">

<option>Blox Fruits</option>
<option>Adopt Me!</option>
<option>Pet Simulator 99</option>
<option>Blade Ball</option>
<option>Brookhaven RP</option>
<option>Murder Mystery 2</option>
<option>Jailbreak</option>
<option>King Legacy</option>
<option>Anime Adventures</option>
<option>Fisch</option>
<option>Grow a Garden</option>
<option>Steal a Brainrot</option>

</select>

<textarea id="offer" placeholder="Ton échange"></textarea>

<button onclick="addTrade()">Publier</button>

</div>

<div class="card">

<h2>🔍 Recherche</h2>

<input id="search" onkeyup="render()" placeholder="Rechercher...">

</div>

<div id="list"></div>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];

function render(){

let list = document.getElementById("list");
list.innerHTML="";

let search = document.getElementById("search").value.toLowerCase();

let filtered = trades.filter(t =>
(t.user + t.game + t.offer).toLowerCase().includes(search)
);

document.getElementById("count").innerText = filtered.length;

filtered.forEach((t,i)=>{

list.innerHTML += `
<div class="trade">

<b>👤 ${t.user}</b>
<span class="small"> - 🎮 ${t.game}</span>

<p>${t.offer}</p>

<button class="delete" onclick="removeTrade(${i})">
Supprimer
</button>

</div>
`;

});

}

function addTrade(){

let user = document.getElementById("user").value;
let game = document.getElementById("game").value;
let offer = document.getElementById("offer").value;

if(!user || !game || !offer){
alert("Remplis tout !");
return;
}

trades.unshift({user,game,offer});

localStorage.setItem("trades",JSON.stringify(trades));

document.getElementById("user").value="";
document.getElementById("offer").value="";

render();

}

function removeTrade(i){

trades.splice(i,1);

localStorage.setItem("trades",JSON.stringify(trades));

render();

}

render();

</script>

</body>
</html>
