<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBLX Trade Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#2563eb;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.trade{
background:#1f2937;
padding:10px;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
🎮 RBLX Trade Hub
</header>

<div class="container">

<!-- OFFRES -->
<div class="card">
<h2>Créer une offre</h2>

<input id="user" placeholder="Pseudo Roblox">

<select id="game">
<option>Blox Fruits</option>
<option>Adopt Me!</option>
<option>Pet Simulator 99</option>
<option>Blade Ball</option>
<option>Brookhaven RP</option>
<option>Steal a Brainrot</option>
</select>

<textarea id="offer" placeholder="Ton échange"></textarea>

<button onclick="addTrade()">Publier</button>
</div>

<!-- CHAT -->
<div class="card">
<h2>💬 Chat global</h2>

<div id="chatBox" style="height:150px;overflow:auto;background:#0f172a;padding:10px;border-radius:10px;"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Envoyer</button>
</div>

<div id="list"></div>

</div>

<script>

// OFFRES
let trades = [];

function addTrade(){
let user = document.getElementById("user").value;
let game = document.getElementById("game").value;
let offer = document.getElementById("offer").value;

if(!user || !game || !offer) return alert("Remplis tout");

trades.unshift({user,game,offer});
render();
}

function render(){
let list = document.getElementById("list");
list.innerHTML="";

trades.forEach(t=>{
list.innerHTML += `
<div class="trade">
<b>${t.user}</b> - ${t.game}
<p>${t.offer}</p>
</div>
`;
});
}

// CHAT (LOCAL)
function sendMsg(){
let msg = document.getElementById("msg").value;
if(!msg) return;

document.getElementById("chatBox").innerHTML +=
`<div>💬 ${msg}</div>`;

document.getElementById("msg").value="";
}

</script>

</body>
</html>
