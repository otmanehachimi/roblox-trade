<div class="card">
<h2>💬 Chat mondial</h2>

<div id="chatBox" style="height:180px;overflow:auto;background:#0f172a;padding:10px;border-radius:10px;"></div>

<input id="msg" placeholder="Écris un message...">
<button onclick="sendMsg()">Envoyer</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 REMPLACE ICI AVEC TON FIREBASE
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  databaseURL: "https://TON_PROJECT-default-rtdb.firebaseio.com",
  projectId: "TON_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 📤 envoyer message
window.sendMsg = function(){
let msg = document.getElementById("msg").value;
if(!msg) return;

push(ref(db,"chat"),{
text: msg,
time: Date.now()
});

document.getElementById("msg").value="";
};

// 📡 recevoir messages
onChildAdded(ref(db,"chat"), (data)=>{
let val = data.val();

document.getElementById("chatBox").innerHTML +=
`<div>💬 ${val.text}</div>`;
});
</script>
